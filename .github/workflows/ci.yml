# ABOUTME: GitHub Actions CI workflow for dippin-lang
# ABOUTME: Runs tests, linting, golangci-lint, and example validation on Go 1.25
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Run tests with race detector and coverage
        run: go test ./... -count=1 -race -coverprofile=coverage.out

      - name: Coverage check
        run: |
          total=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          threshold=80
          if [ "$(echo "$total < $threshold" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${total}% is below threshold ${threshold}%"
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.7.2
          args: --timeout=10m
          verify: false

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build binary
        run: go build -o dippin ./cmd/dippin/

      - name: Verify binary
        run: ./dippin --help || ./dippin help || true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: dippin-linux-amd64
          path: dippin
          retention-days: 7

  validate-examples:
    name: Validate Examples
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build dippin
        run: go build -o dippin ./cmd/dippin/

      - name: Parse all .dip examples
        run: |
          failed=0
          for f in examples/*.dip; do
            if ! ./dippin parse "$f" > /dev/null 2>&1; then
              echo "::error::Failed to parse $f"
              ./dippin parse "$f" 2>&1 || true
              failed=1
            fi
          done
          exit $failed

      - name: Validate all .dip examples
        run: |
          failed=0
          for f in examples/*.dip; do
            if ! ./dippin validate "$f" 2>&1; then
              failed=1
            fi
          done
          exit $failed

      - name: Lint all .dip examples
        run: |
          for f in examples/*.dip; do
            ./dippin lint "$f" 2>&1
          done

      - name: Format check all .dip examples (idempotency)
        run: |
          failed=0
          for f in examples/*.dip; do
            formatted=$(./dippin fmt "$f" 2>/dev/null)
            reformatted=$(echo "$formatted" | ./dippin fmt /dev/stdin 2>/dev/null)
            if [ "$formatted" != "$reformatted" ]; then
              echo "::error::$f is not format-idempotent"
              failed=1
            fi
          done
          exit $failed

      - name: Full round-trip (parse -> format -> re-parse -> validate)
        run: |
          failed=0
          for f in examples/*.dip; do
            formatted=$(./dippin fmt "$f" 2>/dev/null)
            tmp=$(mktemp /tmp/roundtrip-XXXXXX.dip)
            echo "$formatted" > "$tmp"
            if ! ./dippin validate "$tmp" > /dev/null 2>&1; then
              echo "::error::$f fails round-trip: formatted output doesn't validate"
              ./dippin validate "$tmp" 2>&1 || true
              failed=1
            fi
            rm -f "$tmp"
          done
          exit $failed

      - name: Validate migration parity
        run: |
          failed=0
          for f in examples/*.dot; do
            base=$(basename "$f" .dot)
            dip="examples/${base}.dip"
            if [ -f "$dip" ]; then
              if ! ./dippin validate-migration "$f" "$dip" 2>&1; then
                failed=1
              fi
            fi
          done
          exit $failed

      - name: Simulate all examples (dry-run)
        run: |
          failed=0
          for f in examples/*.dip; do
            if ! ./dippin simulate "$f" > /dev/null 2>&1; then
              echo "::warning::$f simulation had issues"
              ./dippin simulate "$f" 2>&1 | tail -5 || true
            fi
          done

      - name: Doctor all examples
        run: |
          for f in examples/*.dip; do
            echo "--- $f ---"
            ./dippin doctor "$f" 2>&1 || true
          done

      - name: Cost-optimize all examples
        run: |
          for f in examples/*.dip; do
            echo "--- $f ---"
            ./dippin optimize "$f" 2>&1 || true
          done

  dippin-lint:
    name: Dippin Lint Action (dogfood)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build and install dippin
        run: go install ./cmd/dippin/

      - name: Lint examples
        run: |
          summary="## Dippin Lint Results\n\n"
          summary+="| File | Status | Errors | Warnings |\n"
          summary+="|------|--------|--------|----------|\n"
          for f in examples/*.dip; do
            output=$(dippin --format json check "$f" 2>/dev/null) || true
            valid=$(echo "$output" | jq -r '.valid // false')
            errors=$(echo "$output" | jq -r '.errors // 0')
            warnings=$(echo "$output" | jq -r '.warnings // 0')
            status="pass"
            [ "$valid" != "true" ] && status="fail"
            summary+="| \`$f\` | $status | $errors | $warnings |\n"
          done
          echo -e "$summary" >> "$GITHUB_STEP_SUMMARY"
