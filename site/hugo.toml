baseURL = "https://dippin.org/"
languageCode = "en-us"
title = "Dippin"
uglyURLs = true
enableGitInfo = true
disableHugoGeneratorInject = true
disableKinds = ["taxonomy", "term"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    # codeFences must be true for the render-codeblock hook to fire.
    # Hugo's own Chroma highlighter is bypassed by the custom hook in
    # layouts/_default/_markup/render-codeblock.html — runtime highlighting
    # is still handled client-side by static/highlight.js.
    codeFences = true
    noClasses = false

[mediaTypes."text/plain"]
  suffixes = ["txt"]

[outputFormats.llmstxt]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  notAlternative = true

[mediaTypes."text/markdown"]
  suffixes = ["md"]

[outputFormats.sitemapmd]
  mediaType = "text/markdown"
  baseName = "sitemap"
  isPlainText = true
  notAlternative = true

[outputs]
  home = ["HTML", "llmstxt", "sitemapmd"]

[params]
  description = "A language for AI pipeline workflows"

# Primary nav (top row)
[[menus.main]]
  name = "Docs"
  pageRef = "/language"
  weight = 1
  [menus.main.params]
    highlightDocs = true

[[menus.main]]
  name = "Playground"
  pageRef = "/playground"
  weight = 2

[[menus.main]]
  name = "Blog"
  # Hardcoded URL (not pageRef) because Hugo resolves section pageRefs to
  # /blog/index.html under uglyURLs, but the rendered file is /blog.html.
  url = "/blog.html"
  weight = 3

[[menus.main]]
  name = "GitHub"
  url = "https://github.com/2389-research/dippin-lang"
  weight = 4
  [menus.main.params]
    external = true

# Docs sub-nav (second row)
[[menus.docs]]
  name = "CLI"
  pageRef = "/cli"
  weight = 1

[[menus.docs]]
  name = "Language"
  pageRef = "/language"
  weight = 2

[[menus.docs]]
  name = "Testing"
  pageRef = "/testing"
  weight = 3

[[menus.docs]]
  name = "Validation"
  pageRef = "/validation"
  weight = 4

[[menus.docs]]
  name = "Analysis"
  pageRef = "/analysis"
  weight = 5

[[menus.docs]]
  name = "Architecture"
  pageRef = "/architecture"
  weight = 6

[[menus.docs]]
  name = "Editors"
  pageRef = "/editors"
  weight = 7

[[menus.docs]]
  name = "Changelog"
  pageRef = "/changelog"
  weight = 8
