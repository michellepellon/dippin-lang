{{ define "main" }}
<section class="doc">
<div class="container">
  <div class="doc-header">
    <div class="section-label">Learn</div>
    <h1>Blog</h1>
    <p>Tutorials, deep dives, and practical guides for every part of the Dippin toolchain.</p>
  </div>

  <div class="doc-body">

    <div class="blog-grid">
      {{ range .Pages.ByDate.Reverse }}
      <a class="post-card" data-topic="{{ .Params.tagStyle }}" href="{{ .Permalink }}">
        <div class="post-meta">
          <span class="post-tag {{ .Params.tagStyle }}">{{ .Params.tagLabel }}</span>
          {{ .Params.category }}
        </div>
        <h3>{{ .Title }}</h3>
        <p>{{ .Description }}</p>
        <span class="read-more">Read &rarr;</span>
      </a>
      {{ end }}
    </div>
  </div>
</div>
</section>
{{ end }}
