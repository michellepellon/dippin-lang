# ABOUTME: golangci-lint v2 configuration for Go code quality checks
# ABOUTME: Relaxed initial config — tighten linters incrementally as codebase is cleaned up

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: true

linters:
  enable:
    # Bug detection
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Style
    - misspell
    - whitespace

    # Code complexity
    - gocyclo
    - gocognit
    - funlen

    # Error handling
    - errorlint

  disable:
    # Disabled until codebase cleanup pass
    - bodyclose
    - nilerr
    - nilnil
    - errchkjson
    - contextcheck
    - prealloc
    - makezero
    - godot
    - nestif
    - gosec
    - copyloopvar
    - gocritic
    - unconvert
    - unparam
    - wastedassign
    - exhaustruct
    - exhaustive
    - varnamelen
    - tagliatelle
    - wrapcheck
    - paralleltest
    - thelper
    - testpackage

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

    govet:
      enable-all: true
      disable:
        - shadow
        - fieldalignment

    gocyclo:
      min-complexity: 20

    gocognit:
      min-complexity: 30

    funlen:
      lines: 100
      statements: 50
      ignore-comments: true

    misspell:
      locale: US

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    staticcheck:
      checks:
        - "all"
        - "-ST1000"  # Package comments — add later
        - "-S1017"   # strings.TrimPrefix suggestion — cosmetic
        - "-QF1001"  # De Morgan's law — cosmetic

  exclusions:
    rules:
      # Exclude some linters from running on test files
      - path: _test\.go
        linters:
          - gocyclo
          - gocognit
          - errcheck
          - funlen
          - misspell

      # Exclude some linters from running on main.go
      - path: cmd/.*main\.go
        linters:
          - gocyclo
          - gocognit
          - funlen

severity:
  default: error
